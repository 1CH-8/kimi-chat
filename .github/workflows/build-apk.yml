name: Build Kimi Chat APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet -i https://pypi.tuna.tsinghua.edu.cn/simple
      - name: Build APK (auto confirm installation)
        run: |
          echo "y" | flet build apk --product 'Kimi Chat' --build-number 1 --build-version 1.0.0
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kimi-chat-apk
          path: build/apk/*.apk
